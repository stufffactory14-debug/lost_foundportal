<!DOCTYPE html>
<html>

<head>
<title>Dashboard - Lost & Found</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<nav class="navbar">
<h2>Lost & Found Portal</h2>

<div class="nav-links">
<a href="/pages/upload-lost.html">Report Lost</a>
<a href="/pages/upload-found.html">Report Found</a>
<a href="/pages/items.html">Browse Items</a>
<a href="#" onclick="logout()">Logout</a>
</div>
</nav>

<section class="hero">

<h1>Welcome to Dashboard</h1>

<p>Manage lost & found items easily.</p>

<div class="hero-buttons">

<a href="/pages/upload-lost.html">
<button class="btn-primary">Report Lost Item</button>
</a>

<a href="/pages/upload-found.html">
<button class="btn-secondary">Report Found Item</button>
</a>

</div>

</section>


<!-- SEARCH SECTION -->
<section class="search-section">

<h2>Search Lost & Found Items</h2>

<input type="text" placeholder="Search items..." id="searchInput" onkeyup="searchItems()">

</section>


<!-- ITEMS SECTION -->
<section class="recent-items">

<h2>All Items</h2>

<div id="itemsContainer"></div>

</section>


<!-- FOOTER -->
<footer class="footer">

<p>© 2026 Lost & Found Portal</p>

<p>Helping people reconnect with their belongings.</p>

</footer>


<!-- SCRIPTS -->
<script src="/js/items.js"></script>

<script>
// 🔐 Protect Dashboard
const user = localStorage.getItem("user");

if(!user){
    window.location.href = "/pages/login.html";
}

// 🚪 Logout
function logout(){
    localStorage.removeItem("user");
    window.location.href = "/pages/login.html";
}

// 🔍 Search Function
function searchItems(){
    const input = document.getElementById("searchInput").value.toLowerCase();
    const cards = document.querySelectorAll(".item-card");

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        if(text.includes(input)){
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>

</html>
